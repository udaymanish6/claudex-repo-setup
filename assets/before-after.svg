<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Before and after installing Claudex</title>
  <desc id="desc">A project before Claudex has normal application files. After Claudex it keeps those files and adds Claude and Codex setup files.</desc>
  <defs>
    <linearGradient id="panelA" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#1e293b"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
    <linearGradient id="panelB" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#172554"/><stop offset="1" stop-color="#0f172a"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#020617" flood-opacity="0.25"/></filter>
  </defs>
  <rect width="1200" height="620" rx="28" fill="#0b1120"/>
  <text x="600" y="62" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="34" font-weight="800" fill="#f8fafc">Before and after</text>
  <text x="600" y="98" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="18" fill="#cbd5e1">Claudex adds agent setup files without touching your application code.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="145" width="485" height="405" rx="22" fill="url(#panelA)" stroke="#334155" stroke-width="2"/>
    <rect x="645" y="145" width="485" height="405" rx="22" fill="url(#panelB)" stroke="#3b82f6" stroke-opacity="0.6" stroke-width="2"/>
  </g>

  <text x="110" y="198" font-family="Inter, ui-sans-serif, system-ui" font-size="26" font-weight="800" fill="#f8fafc">Before</text>
  <text x="110" y="228" font-family="Inter, ui-sans-serif, system-ui" font-size="16" fill="#94a3b8">A normal project</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19" fill="#e5e7eb">
    <text x="122" y="282">my-project/</text>
    <text x="152" y="320">package.json</text>
    <text x="152" y="356">src/</text>
    <text x="182" y="392">app.ts</text>
    <text x="152" y="428">tests/</text>
    <text x="182" y="464">app.test.ts</text>
  </g>

  <text x="685" y="198" font-family="Inter, ui-sans-serif, system-ui" font-size="26" font-weight="800" fill="#f8fafc">After</text>
  <text x="685" y="228" font-family="Inter, ui-sans-serif, system-ui" font-size="16" fill="#bfdbfe">Same project plus native agent setup</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#e5e7eb">
    <text x="697" y="282">my-project/</text>
    <text x="727" y="316">package.json, src/, tests/</text>
    <text x="727" y="350" fill="#86efac">CLAUDE.md</text>
    <text x="727" y="384" fill="#86efac">.claude/</text>
    <text x="727" y="418" fill="#93c5fd">AGENTS.md</text>
    <text x="727" y="452" fill="#93c5fd">.agents/skills/</text>
    <text x="727" y="486" fill="#93c5fd">.codex/</text>
    <text x="727" y="520" fill="#5eead4">AGENT-*.md generated after init</text>
  </g>

  <path d="M575 340 L625 340" stroke="#94a3b8" stroke-width="4" stroke-linecap="round"/>
  <path d="M612 325 L630 340 L612 355" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
