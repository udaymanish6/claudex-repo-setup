<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="640" viewBox="0 0 1200 640" role="img" aria-labelledby="title desc">
  <title id="title">Claudex native Claude and Codex setup with shared memory</title>
  <desc id="desc">Claude Code keeps CLAUDE.md and .claude files. Codex keeps AGENTS.md, .codex, and .agents files. Both use shared AGENT memory files.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1200" height="640" rx="28" fill="url(#bg)"/>
  <text x="600" y="62" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="34" font-weight="800" fill="#f8fafc">Native files. Shared memory. No blended setup.</text>
  <text x="600" y="98" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="18" fill="#cbd5e1">Claudex keeps each agent in its own format while aligning project context through AGENT-*.md.</text>

  <g filter="url(#shadow)">
    <rect x="70" y="150" width="430" height="295" rx="20" fill="#1f2937" stroke="#334155" stroke-width="2"/>
    <rect x="700" y="150" width="430" height="295" rx="20" fill="#1f2937" stroke="#334155" stroke-width="2"/>
    <rect x="315" y="485" width="570" height="110" rx="20" fill="#122c2b" stroke="#2dd4bf" stroke-opacity="0.65" stroke-width="2"/>
  </g>

  <text x="105" y="198" font-family="Inter, ui-sans-serif, system-ui" font-size="25" font-weight="800" fill="#f8fafc">Claude Code</text>
  <text x="105" y="226" font-family="Inter, ui-sans-serif, system-ui" font-size="16" fill="#94a3b8">Native Claude surface</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#e5e7eb">
    <text x="120" y="277">CLAUDE.md</text>
    <text x="120" y="313">.claude/settings.json</text>
    <text x="120" y="349">.claude/hooks/</text>
    <text x="120" y="385">.claude/skills/</text>
    <text x="120" y="421">.claude/commands/ + agents/</text>
  </g>

  <text x="735" y="198" font-family="Inter, ui-sans-serif, system-ui" font-size="25" font-weight="800" fill="#f8fafc">Codex</text>
  <text x="735" y="226" font-family="Inter, ui-sans-serif, system-ui" font-size="16" fill="#94a3b8">Native Codex surface</text>
  <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#e5e7eb">
    <text x="750" y="277">AGENTS.md</text>
    <text x="750" y="313">.codex/config.toml</text>
    <text x="750" y="349">.codex/hooks.json + hooks/</text>
    <text x="750" y="385">.agents/skills/</text>
    <text x="750" y="421">.codex/agents/*.toml</text>
  </g>

  <path d="M318 445 C380 485 420 498 480 510" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M882 445 C820 485 780 498 720 510" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <text x="600" y="526" text-anchor="middle" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="800" fill="#ccfbf1">Shared repo memory</text>
  <text x="600" y="558" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#f8fafc">AGENT-activeContext.md  AGENT-patterns.md  AGENT-decisions.md</text>
  <text x="600" y="586" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18" fill="#f8fafc">AGENT-troubleshooting.md  AGENT-config-variables.md</text>
</svg>
